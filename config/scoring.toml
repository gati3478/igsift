# Scoring configuration for ig-mgr.
#
# Edit these to tune recommendations without recompiling. All values are
# INITIAL guesses from the design sketch — expect to iterate empirically once
# the pipeline runs against a real export. See docs/DESIGN.md.
#
# Every key in [weights] appears exactly once in the scoring formula
# (DESIGN.md "Scoring composition"). When adding or removing a feature,
# update both files together to keep them in sync.
#
# NOTE: this file is read by code that does not exist yet. It documents the
# intended shape; the deserialization struct lands with the scoring module.

# Feature weights. Relative magnitudes matter more than absolute scale (a
# sigmoid squashes the result). "high / medium / low" from the design map
# roughly to these.
[weights]
# --- engagement (outbound: things I did toward them) ---
dm = 3.0                          # DM volume (log-scaled, recency-weighted)
likes = 1.0                       # likes I gave on their posts/comments
comments = 1.5                    # comments I left on their posts/reels/stories
story_out = 0.5                   # story interactions I sent (polls, quizzes, likes, etc.)
                                  # Halved from 1.0 after story_likes.json (~28k events)
                                  # folded into this signal: the volume ~doubled, so the
                                  # weight compensates. Was inflating drop-intent
                                  # story-heavy accounts into `keep` (hard mismatches).
stories_viewed = 0.2              # passive — I watched their story (low intent)
saved = 0.5                       # saves of their posts
reactions_given = 1.0             # DM reactions I sent on their messages

# --- reciprocity (inbound: things they did toward me, where the export ships it) ---
reactions_received = 2.0          # DM reactions they sent on my messages — the
                                  # only true inbound signal Instagram ships

# --- tenure ---
tenure = 0.15                     # log(follow_tenure_days + 1) — longstanding
                                  # follow = mild commitment proxy

# --- penalties (subtracted from score_raw) ---
dm_balance_penalty = 1.0          # one-sided thread (I send, they don't)
reaction_balance_penalty = 0.5    # one-sided reactions (I react, they don't)
hide_story_penalty = 2.0          # I hid my stories from them
removed_suggestion_penalty = 0.3  # I dismissed them from PYMK

# --- boolean boosts (added when the gate is on) ---
close_friend_boost = 5.0          # close_friends.json — should land in `keep`
favorite_boost = 3.0              # profiles_you've_favorited.json — also `keep`
inbound_request = 0.5             # thread present in messages/message_requests/

# Exponential decay half-lives (τ), in days. A signal older than τ is worth
# ~37% of a fresh one; older interactions fade rather than count forever.
[decay]
tau_dm_days = 180
tau_content_days = 730   # 2-yr relevance horizon (round 8); mirrors deep_mutual_keep_days

# Sigmoid mapping score_raw -> keep_probability, and the bucket cut-offs.
[scoring]
threshold = 1.5    # center of the sigmoid (score_raw at keep_prob = 0.5)
scale = 1.0        # spread; larger = softer transition
keep_min = 0.7     # keep_prob >= keep_min            -> keep
unfollow_max = 0.43 # keep_prob <  unfollow_max (+gates) -> unfollow
                   # everything in between             -> review
                   # Raised 0.35 -> 0.43 (2026-05-30): surfaces 13 -> 43 unfollow
                   # candidates with still 0 hard mismatches vs labels.txt. 0.44 is
                   # the floor of the labeled-keep cluster; 0.45+ flips real keeps.
                   # Personal calibration — the balanced preset stays at 0.35.

# Relationship gates (mirror cut-offs above; both are monotonic — they can
# only refuse to auto-keep a stranger / refuse to drop a deep mutual, never
# manufacture an unfollow).
require_reciprocity_for_keep = false # OFF for this user: the 2026-05-30 labeling
                                     # pass showed it demotes deliberately-curated
                                     # one-way creator/brand follows (20/20 labeled
                                     # keep) — agreement 34.5% -> 69.0% with it off.
                                     # Non-mutuality is not a drop signal for this
                                     # following style; real drops go on droplist.txt.
deep_mutual_keep_days = 730          # mutual & reciprocal age >= 2y -> keep floor; 0 disables
