# Scoring configuration for ig-mgr.
#
# Edit these to tune recommendations without recompiling. All values are
# INITIAL guesses from the design sketch — expect to iterate empirically once
# the pipeline runs against a real export. See docs/DESIGN.md.
#
# NOTE: this file is read by code that does not exist yet. It documents the
# intended shape; the deserialization struct lands with the scoring module.

# Feature weights feeding `engagement_raw` and `reciprocity`.
# Relative magnitudes matter more than absolute scale (a sigmoid squashes the
# result). "high / medium / low" from the design map roughly to these.
[weights]
dm = 3.0                  # DM volume (log-scaled)
likes = 1.0              # likes I gave (log-scaled, recency-weighted)
comments = 1.5          # comments I made
story_out = 1.0         # story interactions I sent
story_in = 2.0          # inbound story reactions/replies (reciprocity proxy)
dm_balance_penalty = 1.0 # penalty for one-sided DM threads
tagged_them = 0.5
they_tagged_me = 1.5
saved_their_content = 0.5
searched_for_them = 0.5
close_friend_boost = 5.0 # hard boost; close friends should land in `keep`

# Exponential decay half-lives (τ), in days. A signal older than τ is worth
# ~37% of a fresh one; older interactions fade rather than count forever.
[decay]
tau_dm_days = 180
tau_content_days = 365

# Sigmoid mapping score_raw -> keep_probability, and the bucket cut-offs.
[scoring]
threshold = 0.0   # center of the sigmoid (score_raw at keep_prob = 0.5)
scale = 1.0       # spread; larger = softer transition
keep_min = 0.7    # keep_prob >= keep_min            -> keep
unfollow_max = 0.3 # keep_prob <  unfollow_max (+gates) -> unfollow
                  # everything in between             -> review
