name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs for the same ref/PR.
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Least privilege: neither job writes to the repo.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build --all-targets

      - name: Install nextest
        uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2
        with:
          tool: nextest

      - name: Test
        run: cargo nextest run

  # Runtime smoke-test on native Windows — x64 (windows-latest) and arm64
  # (windows-11-arm). The unit/integration suite only runs on Linux (the
  # `check` job above), and the release workflow merely *cross-builds* the
  # Windows targets — so without this, nothing ever executes a Windows binary.
  # Build it and exercise version + check + a full audit against the fixture,
  # asserting all three output files are produced, on each architecture.
  windows-smoke:
    name: windows-smoke (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        runner: [windows-latest, windows-11-arm]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.runner }}

      - name: Build release binary
        run: cargo build --release --bin igsift

      - name: Smoke-test the binary
        shell: pwsh
        run: |
          $bin = ".\target\release\igsift.exe"
          & $bin --version
          if ($LASTEXITCODE -ne 0) { throw "igsift --version failed ($LASTEXITCODE)" }
          & $bin check tests/fixtures/sample_export
          if ($LASTEXITCODE -ne 0) { throw "igsift check failed ($LASTEXITCODE)" }
          & $bin --preset balanced --out "$env:RUNNER_TEMP\audit" tests/fixtures/sample_export
          if ($LASTEXITCODE -ne 0) { throw "igsift run failed ($LASTEXITCODE)" }
          foreach ($f in "audit.csv","audit.md","audit.html") {
            if (-not (Test-Path "$env:RUNNER_TEMP\$f")) { throw "$f was not produced" }
          }
          Write-Host "Windows smoke-test passed: version + check + run all OK"

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Advisories / bans / sources
        uses: EmbarkStudios/cargo-deny-action@08f29ebbc9295095546acaf37220058f628a4720 # v2
        with:
          command: check advisories bans sources
