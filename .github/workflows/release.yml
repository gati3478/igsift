name: Release

# Build cross-platform binaries and attach them to a GitHub Release.
# Triggered by pushing a version tag (e.g. `v0.1.0`). Can also be run from the
# Actions tab via "Run workflow" — pick the tag in the ref dropdown there, which
# sets `github.ref` to that tag (no manual input needed).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# Both jobs create / write the Release, so they need write access.
permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # Create the GitHub Release once, up front. The build matrix below fans out
  # in parallel and each leg only *uploads* to this pre-existing release —
  # without this, every leg races to find/create the release, none wins, and
  # they all fail with "release not found".
  create-release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Create release if absent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — reusing it."
          else
            # 0.x tags are pre-releases; 1.0.0+ ship as full releases.
            prerelease=""
            case "$TAG" in v0.*) prerelease="--prerelease" ;; esac
            gh release create "$TAG" --verify-tag --title "igsift $TAG" --generate-notes $prerelease
          fi

  upload:
    name: ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS — Apple Silicon only (no Intel/x86_64 build).
          - target: aarch64-apple-darwin
            os: macos-14

          # Windows — x64 and ARM64. ARM64 cross-compiles on the x64 runner
          # (build-only; its tests can't execute here, which is fine for a
          # release artifact).
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-latest

          # Linux — statically linked against musl so the binary has no glibc
          # version dependency and runs on Fedora (and every other distro)
          # regardless of the builder's libc.
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          key: ${{ matrix.target }}

      # Linux targets cross-compile against musl; the runner has no musl
      # linker by default (`error: linker 'cc' not found`). This sets up the
      # cross C toolchain and the CARGO_TARGET_*_LINKER env so the plain cargo
      # build below links correctly. macOS/Windows build natively and skip it.
      - name: Set up cross toolchain (Linux)
        if: contains(matrix.target, '-linux-')
        uses: taiki-e/setup-cross-toolchain-action@3d9770ce98eb7dbcf378563182a5e8031165f75b # v1.41.0
        with:
          target: ${{ matrix.target }}

      # Builds `igsift` for the target, archives it (.tar.gz on unix, .zip on
      # Windows) with README + LICENSE, writes a SHA-256 checksum file, and
      # uploads them to the release created above.
      - name: Build and upload
        uses: taiki-e/upload-rust-binary-action@f0d45ae91ee7b8ee928de7a9d04d893a08bcbec6 # v1.30.2
        with:
          bin: igsift
          target: ${{ matrix.target }}
          archive: $bin-$tag-$target
          include: README.md,LICENSE
          checksum: sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
